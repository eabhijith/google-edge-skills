<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accent Coach Audio</title>
</head>
<body>
    <audio id="tts-audio" style="display:none;"></audio>

    <script>
        window['ai_edge_gallery_get_result'] = async function(data, secret) {
            try {
                const params = JSON.parse(data);
                const action = params.action;

                if (action === 'play_audio') {
                    const text = params.text;
                    const lang = params.lang || 'en';

                    if (!text) throw new Error('No text provided.');

                    // Use Google Translate TTS unofficial endpoint
                    // Setting <audio> src bypasses CORS restriction on this endpoint
                    const encodedText = encodeURIComponent(text);
                    const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodedText}&tl=${lang}&client=tw-ob`;

                    const audio = document.getElementById('tts-audio');
                    audio.src = ttsUrl;

                    await new Promise((resolve, reject) => {
                        audio.oncanplaythrough = () => {
                            audio.play();
                            resolve();
                        };
                        audio.onerror = () => reject(new Error('Audio failed to load. Check internet connection.'));
                        // Timeout after 8 seconds
                        setTimeout(() => reject(new Error('Audio timed out.')), 8000);
                    });

                    // Wait for playback to finish
                    await new Promise((resolve) => {
                        audio.onended = resolve;
                        // Fallback: resolve after estimated duration
                        setTimeout(resolve, Math.max(3000, text.length * 80));
                    });

                    return JSON.stringify({ result: `Playing: "${text}"` });
                }

                throw new Error(`Unknown action: ${action}`);

            } catch (err) {
                return JSON.stringify({ result: null, error: err.message });
            }
        };
    </script>
</body>
</html>
