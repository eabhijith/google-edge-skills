<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"></head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async function(data, secret) {
    try {
        const params = JSON.parse(data);
        const text = params.text;
        const lang = params.lang || 'de';
        if (!text) throw new Error('No text provided.');

        const encoded = encodeURIComponent(text);
        const encodedLang = encodeURIComponent(lang);
        const playerUrl = `../assets/player.html?text=${encoded}&lang=${encodedLang}`;

        return JSON.stringify({
            result: `Tap play to hear: "${text}"`,
            webview: { url: playerUrl, aspectRatio: 0.3 }
        });
    } catch (err) {
        return JSON.stringify({ result: null, error: err.message });
    }
};
</script>
</body>
</html>
